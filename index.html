<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist FEVER Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f4f4; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; background: #000; color: #fff; padding: 20px; border-radius: 8px 8px 0 0; margin: -20px -20px 20px -20px; border-bottom: 4px solid #00ffcc; }
        .header h1 { margin: 0; color: #00ffcc; font-family: 'Oxanium', sans-serif; font-size: 30px; text-transform: uppercase; }
        #step-gps { text-align: center; padding: 40px 10px; }
        #step-form { display: none; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .photo-item { background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #ddd; }
        .preview-img { width: 100%; display: none; margin-top: 10px; border: 2px solid #000; border-radius: 4px; }
        canvas#signature-pad { border: 2px solid #000; width: 100%; height: 200px; background: #fff; touch-action: none; }
        .btn-main { width: 100%; padding: 18px; background: #000; color: #00ffcc; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading"><h3>ENVIANDO AUDITORIA...</h3><p>Aguarde um momento.</p></div>

<div class="container">
    <div class="header"><h1>FEVER</h1><p>O FUTURO É ELETRIZANTE</p></div>

    <div id="step-gps">
        <h2>Localização do Checklist</h2>
        <p>Clique abaixo para registrar o local exato.</p>
        <button type="button" id="btn-gps" class="btn-main" onclick="pegarLocalizacao()" style="background:#00ffcc; color:#000;">📍 REGISTRAR LOCALIZAÇÃO</button>
        <p id="status-gps" style="margin-top:15px; font-weight:bold;"></p>
    </div>

    <div id="step-form">
        <form id="formFever">
            <label>Placa do veículo *</label>
            <input type="text" id="placa" required maxlength="8" placeholder="ABC1D23" style="text-transform: uppercase;">
            
            <label>Chassi *</label>
            <input type="text" id="chassi" required>
            
            <label>Modelo do veículo *</label>
            <select id="modeloVeiculo" required onchange="gerarCamposFotos()">
                <option value="" disabled selected>Selecione</option>
                <optgroup label="NEXTEM">
                    <option value="NEXTEM FN1000 HIGH BOX">NEXTEM FN1000 HIGH BOX</option>
                    <option value="NEXTEM FN1000 MEGA BOX">NEXTEM FN1000 MEGA BOX</option>
                </optgroup>
                <optgroup label="RAP">
                    <option value="RAP FR250 BOX">RAP FR250 BOX</option>
                    <option value="RAP FR250 CAGE">RAP FR250 CAGE</option>
                </optgroup>
            </select>

            <label>KM Atual *</label><input type="number" id="km" required>
            <label>Empresa (Cliente) *</label><input type="text" id="empresa" required>
            <label>CNPJ Empresa *</label><input type="text" id="cnpj" required>
            <label>Usuário *</label><input type="text" id="cliente" required>
            <label>Telefone *</label><input type="tel" id="telefone" required>
            <label>Data do Checklist *</label><input type="date" id="dataRecebimento" required>

            <label>Dano constatado?</label>
            <select id="dano"><option value="Não">Não</option><option value="Sim">Sim</option></select>
            <textarea id="desc" rows="2" placeholder="Observações de danos"></textarea>

            <h3>Fotos do veículo</h3>
            <div id="gridFotos"></div>

            <label style="margin-top:20px;"><input type="checkbox" id="aceiteTermos" required> CONCORDO COM OS TERMOS *</label>

            <h3>Assinatura *</h3>
            <canvas id="signature-pad"></canvas>
            <button type="button" onclick="pad.clear()" style="margin-top:5px; width:100%;">Limpar Assinatura</button>
            
            <button type="submit" class="btn-main">FINALIZAR E ENVIAR</button>
        </form>
    </div>
</div>

<script>
    let userLoc = "Não capturado";
    const canvas = document.getElementById('signature-pad');
    let pad;
    const fotos = {};

    // 1. BUSCA AUTOMÁTICA NA PLANILHA
    document.getElementById("placa").addEventListener("blur", function() {
        const placa = this.value.toUpperCase().trim();
        if (placa.length >= 7) {
            // Chama o Script do Google (o arquivo .gs deve ter a função buscarDadosVeiculo)
            google.script.run.withSuccessHandler(function(veiculo) {
                if (veiculo && veiculo.encontrado) {
                    document.getElementById("chassi").value = veiculo.chassi;
                    document.getElementById("modeloVeiculo").value = veiculo.modelo;
                    document.getElementById("empresa").value = veiculo.empresa;
                    document.getElementById("cnpj").value = veiculo.cnpj;
                    gerarCamposFotos();
                }
            }).buscarDadosVeiculo(placa);
        }
    });

    // 2. FUNÇÃO DE LOCALIZAÇÃO (CORRIGIDA)
    function pegarLocalizacao() {
        const btn = document.getElementById('btn-gps');
        const status = document.getElementById('status-gps');
        btn.disabled = true;
        btn.innerText = "LOCALIZANDO...";

        if (!navigator.geolocation) {
            alert("GPS não suportado. Avançando...");
            mostrarFormulario();
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (p) => {
                userLoc = `Lat: ${p.coords.latitude} Lon: ${p.coords.longitude}`;
                mostrarFormulario();
            },
            (err) => {
                alert("Sinal de GPS fraco ou negado. Por favor, permita a localização.");
                btn.disabled = false;
                btn.innerText = "TENTAR NOVAMENTE";
                // Caso queira forçar a entrada mesmo sem GPS, use mostrarFormulario() aqui.
            },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }

    function mostrarFormulario() {
        document.getElementById('step-gps').style.display = 'none';
        document.getElementById('step-form').style.display = 'block';
        if (!pad) {
            pad = new SignaturePad(canvas);
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();
        }
    }

    // 3. GERAR CAMPOS DE FOTO
    function gerarCamposFotos() {
        const modelo = document.getElementById('modeloVeiculo').value;
        const grid = document.getElementById('gridFotos');
        grid.innerHTML = "";
        
        const labels = modelo.includes("NEXTEM") ? 
            ["Frente", "Lat Direita", "Traseira", "Lat Esquerda", "Placa", "Chassi", "Painel/KM", "Cabine", "Baú", "Capô", "Roda DM", "Roda DP", "Roda TM", "Roda TP", "Carregador", "Reparador"] : 
            ["Frente", "Lat Direita", "Traseira", "Lat Esquerda", "Placa", "Chassi", "Painel/KM", "Banco", "Baú", "Roda D", "Roda TD", "Roda TE", "Carregador", "Ferramentas"];

        labels.forEach((l, i) => {
            grid.innerHTML += `<div class="photo-item"><label>${l}</label><input type="file" accept="image/*" capture="camera" onchange="compactar(this, ${i+1})" required><img id="v${i+1}" class="preview-img"></div>`;
        });
    }

    function compactar(input, id) {
        if (!input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cv = document.createElement('canvas');
                cv.width = 800; cv.height = (800 * img.height) / img.width;
                cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
                const b64 = cv.toDataURL('image/jpeg', 0.6);
                fotos['foto'+id] = b64;
                const preview = document.getElementById('v'+id);
                preview.src = b64; preview.style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
    }

    // 4. ENVIO PARA O SCRIPT GOOGLE
    document.getElementById("formFever").onsubmit = async (e) => {
        e.preventDefault();
        if(pad.isEmpty()) return alert("Assinatura obrigatória!");
        document.getElementById("loading").style.display = "flex";
        
        const payload = {
            ...fotos,
            placa: document.getElementById("placa").value,
            chassi: document.getElementById("chassi").value,
            modelo: document.getElementById("modeloVeiculo").value,
            km: document.getElementById("km").value,
            empresa: document.getElementById("empresa").value,
            cnpj: document.getElementById("cnpj").value,
            cliente: document.getElementById("cliente").value,
            telefone: document.getElementById("telefone").value,
            dataRecebimento: document.getElementById("dataRecebimento").value,
            dano: document.getElementById("dano").value,
            desc: document.getElementById("desc").value || "Sem obs",
            assinatura: pad.toDataURL(),
            localizacao: userLoc,
            timestamp: new Date().toLocaleString("pt-BR")
        };

        const scriptURL = "https://script.google.com/macros/s/AKfycbxqx2NtrWkB7ZTUIDEBSjY_HHc2BdXzFKhCBF2DlrEfRi0vgoFdIYNiUl0Ed42X6lxf/exec";

        try {
            await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            alert("Checklist enviado com sucesso!");
            location.reload();
        } catch (err) { 
            alert("Erro no envio. Verifique sua internet."); 
            document.getElementById("loading").style.display = "none";
        }
    };
</script>
</body>
</html>
