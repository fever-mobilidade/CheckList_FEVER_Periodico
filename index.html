<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist FEVER Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 15px; background: #f4f4f4; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; background: #000; color: #fff; padding: 20px; border-radius: 8px 8px 0 0; margin: -20px -20px 20px -20px; border-bottom: 4px solid #00ffcc; }
        .header h1 { margin: 0; color: #00ffcc; font-family: 'Oxanium', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        /* Ajuste na Placa para maiúsculas */
        #placa { text-transform: uppercase; font-weight: bold; border: 2px solid #000; text-align: center; font-size: 20px; }
        
        /* Alerta de busca */
        #msg-busca { margin-top: 5px; font-size: 13px; font-weight: bold; display: none; padding: 8px; border-radius: 4px; }
        
        .photo-item { background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; border: 1px solid #ddd; }
        .preview-img { width: 100%; height: auto; max-height: 250px; display: none; margin-top: 10px; border: 2px solid #000; }
        canvas#signature-pad { border: 2px solid #000; width: 100%; height: 200px; background: #fff; margin-top: 10px; touch-action: none; }
        .btn-main { width: 100%; padding: 18px; background: #000; color: #00ffcc; border: none; font-weight: bold; font-size: 18px; cursor: pointer; border-radius: 4px; margin-top: 20px; }
        .btn-main:disabled { background: #ccc; color: #666; cursor: not-allowed; }
        
        #loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #00ffcc; z-index: 999; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="loading"><div>ENVIANDO...</div></div>

<div class="container">
    <div class="header"><h1>FEVER</h1><p>O FUTURO É ELETRIZANTE</p></div>

    <form id="formFever">
        <label>Placa do Veículo *</label>
        <input type="text" id="placa" required maxlength="8" placeholder="ABC1D23" oninput="this.value = this.value.toUpperCase()" onblur="buscarNoBanco(this.value)">
        <div id="msg-busca"></div>

        <label>Chassi</label>
        <input type="text" id="chassi" required readonly style="background: #f0f0f0; text-transform: uppercase; ">

        <label>Modelo do Veículo</label>
        <input type="text" id="modeloVeiculo" required readonly style="background: #f0f0f0;">

        <label>Empresa (Cliente)</label>
        <input type="text" id="empresa" required readonly style="background: #f0f0f0; text-transform: uppercase;">

        <label>CNPJ Empresa</label>
        <input type="text" id="cnpj" required readonly style="background: #f0f0f0;">

        <hr>

        <label>KM Atual *</label>
        <input type="number" id="km" required>

        <label>Nome do Usuário *</label>
        <input type="text" id="cliente" required>

        <label>Telefone *</label>
        <input type="tel" id="telefone" required>

        <label>Data *</label>
        <input type="date" id="dataRecebimento" required>

        <div id="areaFotos" style="display:none;">
            <h3>Fotos do Veículo</h3>
            <div id="gridFotos"></div>
        </div>

        <label>Danos Constatados?</label>
        <select id="dano" onchange="document.getElementById('campoObs').style.display=(this.value=='Sim'?'block':'none')">
            <option value="Não">Não</option>
            <option value="Sim">Sim</option>
        </select>
        <div id="campoObs" style="display:none;"><textarea id="desc" rows="3" placeholder="Descreva o dano..."></textarea></div>

        <label>Assinatura *</label>
        <canvas id="signature-pad"></canvas>
        <button type="button" onclick="pad.clear()" style="width:100%; margin-top:5px;">Limpar</button>

        <button type="submit" id="btn-enviar" class="btn-main" disabled>FINALIZAR E ENVIAR</button>
    </form>
</div>

<script>
    let pad;
    const canvas = document.getElementById('signature-pad');
    const fotos = {};

    window.onload = () => { pad = new SignaturePad(canvas); };

    // FUNÇÃO DE BUSCA AUTOMÁTICA
    async function buscarNoBanco(placa) {
        const placaLimpa = placa.toUpperCase().trim().replace(/\s|-/g, "");
        if (placaLimpa.length < 7) return;

        const msg = document.getElementById('msg-busca');
        const btn = document.getElementById('btn-enviar');
        msg.style.display = "block";
        msg.innerText = "Buscando dados...";
        msg.style.color = "blue";
        msg.style.background = "#e1f5fe";

        // SUA CHAVE DE PUBLICAÇÃO DA PLANILHA
        const pubKey = '2PACX-1vRKYiYPdmLaEyTMG_lGfXzrZKA4zIn3e3UyynAP1_9GdMy9En-2dEmum6ubX5kLZcTa_E_kQn2aSXtH';
        const url = `https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?gid=128063943&output=csv`;

        try {
            const response = await fetch(url);
            const data = await response.text();
            const linhas = data.split('\n').map(l => l.split(','));

            const veiculo = linhas.find(cols => {
                const pPlanilha = cols[0].replace(/"/g, "").toUpperCase().trim();
                return pPlanilha === placaLimpa;
            });

            if (veiculo) {
                document.getElementById('chassi').value = veiculo[1].replace(/"/g, "");
                document.getElementById('modeloVeiculo').value = veiculo[2].replace(/"/g, "");
                document.getElementById('empresa').value = veiculo[3].replace(/"/g, "");
                document.getElementById('cnpj').value = veiculo[4].replace(/"/g, "");
                
                msg.innerText = "✅ Veículo Localizado!";
                msg.style.color = "green";
                msg.style.background = "#e8f5e9";
                btn.disabled = false;
                
                document.getElementById('areaFotos').style.display = "block";
                gerarCamposFotos(veiculo[2].replace(/"/g, ""));
            } else {
                msg.innerText = "❌ Placa digitada errada ou não cadastrada!";
                msg.style.color = "red";
                msg.style.background = "#ffebee";
                btn.disabled = true;
                limparCamposBusca();
            }
        } catch (e) {
            msg.innerText = "⚠️ Erro ao conectar ao banco.";
        }
    }

    function limparCamposBusca() {
        ['chassi', 'modeloVeiculo', 'empresa', 'cnpj'].forEach(id => document.getElementById(id).value = "");
        document.getElementById('areaFotos').style.display = "none";
    }

    function gerarCamposFotos(modelo) {
        const grid = document.getElementById('gridFotos');
        grid.innerHTML = "";
        let lista = modelo.includes("NEXTEM") ? ["Frente", "Lateral Dir", "Traseira", "Lateral Esq", "Placa", "Chassi", "Painel/KM"] : ["Frente", "Traseira", "Placa", "Lateral", "Painel"];
        
        lista.forEach((label, i) => {
            grid.innerHTML += `<div class="photo-item"><label>${label} *</label><input type="file" accept="image/*" capture="camera" onchange="compactar(this, ${i+1})" required><img id="v${i+1}" class="preview-img"></div>`;
        });
    }

    function compactar(input, id) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cv = document.createElement('canvas');
                cv.width = 800; cv.height = (img.height / img.width) * 800;
                cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
                fotos['foto'+id] = cv.toDataURL('image/jpeg', 0.7);
                const p = document.getElementById('v'+id); p.src = fotos['foto'+id]; p.style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    document.getElementById("formFever").onsubmit = async (e) => {
        e.preventDefault();
        if(pad.isEmpty()) return alert("Assine o checklist!");
        document.getElementById("loading").style.display = "flex";

        const payload = {
            ...fotos,
            placa: document.getElementById("placa").value,
            chassi: document.getElementById("chassi").value,
            modelo: document.getElementById("modeloVeiculo").value,
            km: document.getElementById("km").value,
            empresa: document.getElementById("empresa").value,
            cnpj: document.getElementById("cnpj").value,
            cliente: document.getElementById("cliente").value,
            telefone: document.getElementById("telefone").value,
            dataRecebimento: document.getElementById("dataRecebimento").value,
            dano: document.getElementById("dano").value,
            desc: document.getElementById("desc").value || "Sem obs",
            assinatura: pad.toDataURL(),
            timestamp: new Date().toLocaleString("pt-BR")
        };

        // COLE A URL DO SEU SCRIPT AQUI ABAIXO
        const scriptURL = "SUA_URL_DO_GOOGLE_SCRIPT_AQUI"; 
        
        try {
            await fetch(scriptURL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            alert("Enviado com Sucesso!");
            location.reload();
        } catch (err) {
            alert("Erro ao enviar.");
            document.getElementById("loading").style.display = "none";
        }
    };
</script>
</body>
</html>
